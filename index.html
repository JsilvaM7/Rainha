<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainha | Inteligência Feminina</title>
    <link rel="stylesheet" href="index.css?v=6.0">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>

    <!-- Firebase SDKs (compat — funciona sem bundler/webpack) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <header class="header">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Abrir menu" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </button>
        <a href="#" class="logo" onclick="event.preventDefault(); loadNewsFeed();">Rainha</a>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Pesquisar por beleza, feminina, Dinâmicas de Controle...">
        </div>
        <div id="auth-slot">
            <button class="login-btn" id="login-btn-default" onclick="window.abrirSideBar ? window.abrirSideBar() : alert('Carregando...')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                Login
            </button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="layout-container">
        <aside class="sidebar">
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" onclick="event.preventDefault(); loadNewsFeed();">
                            <i class="ph ph-house" style="font-size:22px;"></i> Início
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" onclick="event.preventDefault(); loadBeleza();">
                            <i class="ph ph-sparkle" style="font-size:22px;"></i> Beleza
                        </a>
                    </li>
                    <li class="sidebar-item" id="sidebar-item-guias">
                        <a href="#" class="sidebar-link" id="sidebar-link-guias" onclick="event.preventDefault(); renderGuias();">
                            <i class="ph ph-book-open" style="font-size:22px;"></i> Guias
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" onclick="event.preventDefault(); renderFeminina();">
                            <i class="ph ph-gender-female" style="font-size:22px;"></i> Feminina
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" onclick="event.preventDefault(); renderManipulacao();">
                            <i class="ph ph-eye" style="font-size:22px;"></i> Dinâmicas de Controle
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" onclick="event.preventDefault(); renderPosicionamento();">
                            <i class="ph ph-crown" style="font-size:22px;"></i> Posicionamento
                        </a>
                    </li>

                </ul>
            </nav>
        </aside>

        <main class="main-content" id="app-root">
            <div id="content-viewer" class="slide-container"></div>
        </main>

        <aside class="right-panel">
            <div id="ad-showcase-root"></div>
            <div class="info-card">
                <h3>Círculo Rainha</h3>
                <p>Acesse conteúdo exclusivo de inteligência relacional e presença feminina para membros do Círculo Rainha.</p>
                <a href="#" class="info-link" onclick="event.preventDefault(); toggleModal();">Ver Benefícios &rarr;</a>
            </div>
        </aside>
    </div>

    <!-- Modal Círculo Rainha -->
    <div class="modal-overlay" id="voting-modal">
        <div class="modal-container">
            <button class="modal-close" onclick="toggleModal()">&times;</button>
            <div style="margin-bottom:16px;">
                <span style="display:inline-block;background:#fdf8f0;color:var(--sage-green);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 12px;border-radius:20px;margin-bottom:10px;">Círculo Rainha</span>
                <h2 style="color:var(--text-dark);font-size:20px;font-weight:800;line-height:1.3;">Bem-vinda ao seu espaço exclusivo!</h2>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Receitas completas — Livro 1 (6–50) -->
    <script src="Livro 1/livro1_a.js?v=3.0"></script>
    <script src="Livro 1/livro1_b.js?v=2.0"></script>
    <script src="Livro 1/livro1_c.js?v=2.0"></script>
    <!-- Receitas completas — Livro 2 (1–50) -->
    <script src="Livro 2/livro2_a.js?v=2.0"></script>
    <script src="Livro 2/livro2_b.js?v=2.0"></script>
    <script src="Livro 2/livro2_c.js?v=2.0"></script>
    <script src="Livro 2/livro2_d.js?v=2.0"></script>
    <!-- Receitas completas — Livro 3 (1–50) -->
    <script src="Livro 3/livro3_a.js?v=2.0"></script>
    <script src="Livro 3/livro3_b.js?v=2.0"></script>
    <script src="Livro 3/livro3_c.js?v=2.0"></script>
    <script src="Livro 3/livro3_d.js?v=2.0"></script>
    <!-- Receitas completas — Livro 4 (1–50) -->
    <script src="Livro 4/livro4_a.js?v=1.0"></script>
    <script src="Livro 4/livro4_b.js?v=1.0"></script>
    <script src="Livro 4/livro4_c.js?v=1.0"></script>
    <script src="Livro 4/livro4_d.js?v=1.0"></script>
    <!-- Receitas completas — Livro 5 (1–50) -->
    <script src="Livro 5/livro5_a.js?v=1.0"></script>
    <script src="Livro 5/livro5_b.js?v=1.0"></script>
    <script src="Livro 5/livro5_c.js?v=1.0"></script>
    <script src="Livro 5/livro5_d.js?v=1.0"></script>
    <script src="recipes.js?v=3.1"></script>
    <script src="app.js?v=6.0"></script>
    <script src="search.js?v=1.3"></script>
    <script src="auth.js?v=14.1"></script>

    <script>
        function toggleSidebar() {
            var sidebar = document.querySelector(".sidebar");
            var overlay = document.getElementById("sidebar-overlay");
            sidebar.classList.toggle("sidebar-open");
            overlay.classList.toggle("sidebar-overlay--visible");
        }
        document.addEventListener("DOMContentLoaded", function () {
            var links = document.querySelectorAll(".sidebar-link");
            links.forEach(function (link) {
                link.addEventListener("click", function () {
                    if (window.innerWidth <= 768) {
                        document.querySelector(".sidebar").classList.remove("sidebar-open");
                        document.getElementById("sidebar-overlay").classList.remove("sidebar-overlay--visible");
                    }
                });
            });
        });
    </script>
</body>
</html>
